<div class="modal fade" id="ModalDelete" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{url_for('nivel_ensino_delete')}}" method="post" class="needs-validation" novalidate="">
                <input type="hidden" id="id_delete" name="id">
                <div class="modal-header">

                    <h2 class="modal-title h5" id="formModalLabel">Deletar Nivel de Ensino</h2>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!--  -->
                    <div class="container text-center">
                        <div class="row justify-content-md-center">
                            <div class="col-md">
                                <div class="info-list mt-4 text-start">
                                    <div><strong>Não pode ser revertida essa ação, então pense bem aí.</strong></div>
                                </div>

                            </div>
                        </div>
                    </div>
                    <!--  -->
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-outline-secondary"
                        data-bs-dismiss="modal">Voltar</button>
                    <button type="submit" class="btn btn-danger">
                        Deletar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>


<script>

    const MODAL_DELETE = document.getElementById('ModalDelete');

    MODAL_DELETE.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let element_id = button.getAttribute('element-id');

        document.getElementById("id_delete").value = element_id

    });
</script>
