<div class="modal fade" id="ModalCreate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{url_for('nivel_ensino_create')}}" method="post" class="needs-validation" novalidate="">
                <div class="modal-header">
                    <h2 class="modal-title h5">Add Nivel de Ensino</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="container text-center">
                        <div class="row justify-content-md-center mb-3">
                            <div class="col-md-6"><label class="form-label">Status</label><select class="form-select"
                                    name="status" required="">
                                    <option value="">...</option>
                                    <option value="true">Ativado</option>
                                    <option value="false">Desativado</option>
                                </select>
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">name</label>
                                <input class="form-control" required="" name="name">
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center mb-3">
                            <div class="col-md-6">
                                <label class="form-label">externalId</label>
                                <input class="form-control" required="" name="externalId">
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center mb-3">
                            <div class="col-md-6"><label class="form-label">educationLevelTypeId</label><select
                                    class="form-select" name="educationLevelTypeId" required="">
                                    <option value="">...</option>
                                    <option value="graduate">graduate</option>
                                    <option value="undergraduate">undergraduate</option>
                                    <option value="high_school">high_school</option>
                                    <option value="extension_course">extension_course</option>
                                </select>
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                        </div>
                    </div>
                    <!-- // BODY -->
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-outline-secondary"
                        data-bs-dismiss="modal">Voltar</button><button type="submit" class="btn btn-primary">Add Nivel
                        de Ensino</button></div>
            </form>
        </div>
    </div>
</div>
