<div class="modal fade" id="ModalCreate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{url_for('mod_ensino_add')}}" method="post" class="needs-validation" novalidate="">
                <div class="modal-header">
                    <h2 class="modal-title h5">Nova Modalidade de Ensino</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="container text-center">
                        <div class="row mb-3 justify-content-md-center">
                            <div class="col-md-4"><label class="form-label" for="formPlan">Status</label>
                                <select class="form-select" required="" name="status">
                                    <option value="">...</option>
                                    <option value="true">Ativo</option>
                                    <option value="false">Desativado</option>
                                </select>
                                <div class="invalid-feedback">Faz Favor.</div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="formName">Nome</label>
                                <input class="form-control" required="" name="name">
                                <div class="invalid-feedback">Faz Favor.</div>
                            </div>

                        </div>
                        <div class="row">
                            <div class="col-md-6"><label class="form-label" for="formPlan">Tipo da
                                    modalidade</label>
                                <select class="form-select" required="" name="type_modali">
                                    <option value="">...</option>
                                    <option value="face_to_face">face_to_face</option>
                                    <option value="blended_learning">blended_learning</option>
                                    <option value="distance_learning">distance_learning</option>
                                </select>
                                <div class="invalid-feedback">Faz Favor.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="formName">externalId</label>
                                <input class="form-control" required="" name="externalId">
                                <div class="invalid-feedback">Faz Favor.</div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Adicionar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
