<div class="modal fade" id="ModalDelete" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h5" id="confirmModalLabel">Confirmar Exclusão</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">

                </button>
            </div>
            <div class="modal-body">Tem certeza que deseja excluir este registro ?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <a type="button" class="btn btn-danger" id="btnConfirmDelete">Confirmar</a>
            </div>
        </div>
    </div>
</div>
<script>
    const modal = document.getElementById('ModalDelete');

    modal.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera o data-id
        const id = button.getAttribute('element-id');


        // Atualiza o botão de confirmação
        document.getElementById('btnConfirmDelete').href =
            `/cod-externo/delete/${id}`;

    });
</script>
