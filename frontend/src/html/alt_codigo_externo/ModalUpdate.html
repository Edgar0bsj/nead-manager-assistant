<div class="modal fade" id="ModalUpdate" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{ url_for('cod_externo_update') }}" method="post" class="needs-validation" novalidate>
                <!-- ID -->
                <input type="hidden" id="edit_id" name="id">
                <!-- //ID -->
                <div class="modal-header">
                    <h2 class="modal-title h5" id="formModalLabel">Edição</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="container text-center">
                        <div class="row mb-3">
                            <div class="col-md"><label class="form-label" for="formName">Status</label><select
                                    id="edit_status" name="status" class="form-select" required>
                                    <option value="true">Ativo</option>
                                    <option value="false">Desativado</option>
                                </select>
                                <div class="invalid-feedback">faz favor</div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6"><label class="form-label">Sistema</label><select name="sistema"
                                    id="edit_sistema" class="form-select" required>
                                    <option value="">...</option>
                                    <option value="netterm">netterm</option>
                                    <option value="JACAD">JACAD</option>
                                    <option value="universa">universa</option>
                                    <option value="sophia">sophia</option>
                                </select>
                                <div class="invalid-feedback">faz favor</div>
                            </div>

                            <div class="col-md-6"><label class="form-label" for="formPlan">Unidade</label><select
                                    id="edit_unidade" name="unidade" class="form-select" required>
                                    <option value="">...</option>
                                    <option value="nova iguacu">nova iguacu</option>
                                    <option value="itaperuna">itaperuna</option>
                                    <option value="cidade nova">cidade nova</option>
                                </select>
                                <div class="invalid-feedback">faz favor</div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md"><label class="form-label" for="formPlan">Entity</label><select
                                    name="entity" id="edit_entity" class="form-select" required>
                                    <option value="">...</option>
                                    <option value="accessibility">accessibility</option>
                                    <option value="campus">campus</option>
                                    <option value="class">class</option>
                                    <option value="course">course</option>
                                    <option value="curriculum">curriculum</option>
                                    <option value="educational-hub">educational-hub</option>
                                    <option value="education-level">education-level</option>
                                    <option value="enrollment">enrollment</option>
                                    <option value="enrollment-class-subject-status">enrollment-class-subject-status
                                    </option>
                                    <option value="enrollment-group">enrollment-group</option>
                                    <option value="enrollment-period">enrollment-period</option>
                                    <option value="enrollment-status">enrollment-status</option>
                                    <option value="enrollment-type">enrollment-type</option>
                                    <option value="intake">intake</option>
                                    <option value="period">period</option>
                                    <option value="person">person</option>
                                    <option value="shift">shift</option>
                                    <option value="subject">subject</option>
                                    <option value="subject-category">subject-category</option>
                                    <option value="teaching-modality">teaching-modality</option>
                                    <option value="class-subject">class-subject</option>
                                    <option value="class-subject-role">class-subject-role</option>
                                </select>
                                <div class="invalid-feedback">faz favor</div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6"><label class="form-label" for="formName">oldExternalId</label><input
                                    name="oldExternalId" id="edit_oldExternalId" class="form-control" required>
                                <div class="invalid-feedback">faz favor</div>
                            </div>

                            <div class="col-md-6"><label class="form-label" for="formName">newExternalId</label><input
                                    name="newExternalId" id="newExternalId" class="form-control" required>
                                <div class="invalid-feedback">faz favor</div>
                            </div>
                        </div>
                    </div>




                    <!-- //BODY -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Salvar Edição</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>

    const MODAL_EDIT = document.getElementById('ModalUpdate');

    MODAL_EDIT.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let element_id = button.getAttribute('element-id');
        let element_status = button.getAttribute('element-status');
        let element_sistema = button.getAttribute('element-sistema');
        let element_unidade = button.getAttribute('element-unidade');
        let element_entity = button.getAttribute('element-entity');
        let element_oldExternalId = button.getAttribute('element-oldExternalId');
        let element_newExternalId = button.getAttribute('element-newExternalId');

        let _status = element_status == "Ativo" ? "true" : "false"


        document.getElementById("edit_id").value = element_id
        document.getElementById("edit_status").value = _status
        document.getElementById("edit_sistema").value = element_sistema
        document.getElementById("edit_unidade").value = element_unidade
        document.getElementById("edit_entity").value = element_entity
        document.getElementById("edit_oldExternalId").value = element_oldExternalId
        document.getElementById("newExternalId").value = element_newExternalId

    });
</script>
