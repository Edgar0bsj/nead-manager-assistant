<div class="modal fade" id="ModalDetails" tabindex="-1" aria-labelledby="confirmModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h5">Details</h2><button type="button" class="btn-close" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <!-- BODY -->
            <div class="container mb-3">
                <div class="mt-4"><strong>MODALIDADE VINCULADA</strong></div>
                <div class="info-list mt-4 text-start">
                    <div><span>status</span><strong id="lb_status_mod">...</strong></div>
                    <div><span>name</span><strong id="lb_name_mod">...</strong></div>
                    <div><span>externalId</span><strong id="lb_externalId_mod">...</strong></div>
                    <div><span>teachingModalityTypeId</span><strong id="lb_teachingModalityTypeId_mod"
                            class="badge text-bg-success">...</strong>
                    </div>
                </div>
                <div class="mt-4"><strong>NIVEL DE ENSINO</strong></div>
                <div class="info-list mt-4 text-start">
                    <div><span>status</span><strong id="lb_status_nl">...</strong></div>
                    <div><span>name</span><strong id="lb_name_nl">...</strong></div>
                    <div><span>externalId</span><strong id="lb_externalId_nl">...</strong></div>
                    <div><span>educationLevelTypeId</span><strong id="lb_educationLevelTypeId_nl"
                            class="badge text-bg-success">...</strong></div>
                </div>
            </div>
            <!-- // BODY -->

            <div class="modal-footer"><button type="button" class="btn btn-primary"
                    data-bs-dismiss="modal">Voltar</button>
            </div>
        </div>
    </div>
</div>

<script>

    const MODAL_DETAILS = document.getElementById('ModalDetails');

    MODAL_DETAILS.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let mod_status = button.getAttribute('data-mod-status');
        let mod_name = button.getAttribute('data-mod-name');
        let mod_externalId = button.getAttribute('data-mod-externalId');
        let mod_teachingModalityTypeId = button.getAttribute('data-mod-teachingModalityTypeId');

        let nl_status = button.getAttribute('data-nl-status');
        let nl_name = button.getAttribute('data-nl-name');
        let nl_externalId = button.getAttribute('data-nl-externalId');
        let nl_educationLevelTypeId = button.getAttribute('data-nl-educationLevelTypeId');

        // let status = isActive == "True" ? "true" : "false"

        document.getElementById("lb_status_mod").textContent = mod_status
        document.getElementById("lb_name_mod").textContent = mod_name
        document.getElementById("lb_externalId_mod").textContent = mod_externalId
        document.getElementById("lb_teachingModalityTypeId_mod").textContent = mod_teachingModalityTypeId

        document.getElementById("lb_status_nl").textContent = nl_status
        document.getElementById("lb_name_nl").textContent = nl_name
        document.getElementById("lb_externalId_nl").textContent = nl_externalId
        document.getElementById("lb_educationLevelTypeId_nl").textContent = nl_educationLevelTypeId

    });
</script>
