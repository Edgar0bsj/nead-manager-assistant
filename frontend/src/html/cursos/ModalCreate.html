<div class="modal fade" id="ModalCreate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{url_for('cursos_create')}}" method="post" class="needs-validation" novalidate="">
                <div class="modal-header">
                    <h2 class="modal-title h5">Criar um novo curso</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="container text-center">
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <!-- name -->
                            <div class="col-md"><label class="form-label">name</label><input name="name"
                                    class="form-control" required="">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <!-- externalId -->
                            <div class="col-md-6"><label class="form-label">externalId</label><input name="externalId"
                                    class="form-control" required="">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                            <!-- isActive -->
                            <div class="col-md-6"><label class="form-label">isActive</label><select name="isActive"
                                    class="form-select" required="">
                                    <option value="">...</option>
                                    <option value="true">Ativo</option>
                                    <option value="false">Desativado</option>
                                </select>
                                <div class="invalid-feedback">Choose a plan.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <!-- externalTeachingModalityId -->
                            <div class="col-md-6"><label class="form-label">externalTeachingModalityId</label><input
                                    name="externalTeachingModalityId" class="form-control" required="">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                            <!-- externalEducationLevelId -->
                            <div class="col-md-6"><label class="form-label">externalEducationLevelId</label><input
                                    name="externalEducationLevelId" class="form-control" required="">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <!-- courseTypeId -->
                            <div class="col-md-6"><label class="form-label">courseTypeId</label><select
                                    class="form-select" required="" name="courseTypeId">
                                    <option value="">...</option>
                                    <option>bachelor</option>
                                    <option>licentiate</option>
                                    <option>technologist</option>
                                </select>
                                <div class="invalid-feedback">Choose a plan.</div>
                            </div>
                        </div>
                    </div>
                    <!-- // BODY -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar Curso</button>
                </div>
            </form>
        </div>
    </div>
</div>
