<div class="modal fade" id="ModalUpdate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="#" method="post" class="needs-validation" novalidate="">
                <input type="hidden" id="id_update" name="id">
                <div class="modal-header">
                    <h2 class="modal-title h5">Edição de Polo</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="container text-center">
                        <div class="row justify-content-md-center">
                            <div class="col-md-10">
                                <label class="form-label">Nome do Polo</label>

                                <div class="input-group">

                                    <div class="input-group-text" id="btnGroupAddon"><i class="bi bi-bank"></i></div>

                                    <input id="name_update" name="nome" class="form-control" required="">
                                    <div class="invalid-feedback">Faz Favor.</div>

                                </div>

                            </div>

                        </div>
                    </div>
                    <!-- // BODY -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Voltar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>

    const MODAL_UPDATE = document.getElementById('ModalUpdate');

    MODAL_UPDATE.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let id = button.getAttribute('data-id');
        let name = button.getAttribute('data-name');

        document.getElementById("id_update").value = id
        document.getElementById("name_update").value = name
    });
</script>
