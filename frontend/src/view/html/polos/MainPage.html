{% extends "base/base.html" %}
{% block title %}
Polos
{% endblock %}

{% block content %}
<main class="dashboard-content">
    <div class="container-fluid px-3 px-lg-4 py-4">
        <div class="page-heading">
            <div class="page-heading-copy">
                <span class="page-icon"><i class="bi bi-bank" aria-hidden="true"></i></span>
                <div>
                    <p class="eyebrow mb-1">UNIG</p>
                    <h1 class="h3 mb-1">Polos</h1>
                </div>
            </div>

        </div>

        <section class="panel">
            <div class="panel-header">
                <div>

                    <input class="form-control form-control-sm table-search" type="search"
                        placeholder="Pesquisar por Polos" data-table-search="polosTable" aria-label="Search polos">
                </div>
                <div class="heading-actions">
                    <button data-bs-toggle="modal" data-bs-target="#ModalCreate" class="btn btn-primary btn-sm"><i
                            class="bi bi-plus-circle" aria-hidden="true"></i>Add
                        Polo</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table align-middle mb-0" id="polosTable" data-searchable-table="">
                    <thead>
                        <tr>
                            <th>Polo</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-semibold">Nova Iguaçu</td>
                            <td class="text-end">

                                <div class="btn-group" role="group" aria-label="Actions">
                                    <button data-id="5" data-name="Nova Iguaçu" data-bs-toggle="modal"
                                        data-bs-target="#ModalUpdate" type="button"
                                        class="btn btn-light btn-sm">Editar</button>
                                    <button data-id="5" data-bs-toggle="modal" data-bs-target="#ModalDelete"
                                        type="button" class="btn btn-light btn-sm">Deletar</button>
                                </div>

                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <!-- MODAL -->
    {% include "polos/ModalCreate.html" %}
    {% include "polos/ModalUpdate.html" %}
    {% include "polos/ModalDelete.html" %}
</main>
{% endblock %}
