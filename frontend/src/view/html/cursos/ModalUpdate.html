<div class="modal fade" id="ModalUpdate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form action="{{url_for('cursos_update')}}" method="post" class="needs-validation" novalidate="">
                <input type="hidden" id="id_update" name="id">
                <div class="modal-header">
                    <h2 class="modal-title h5">Editar Curso</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="container text-center">
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <div class="col-md"><label class="form-label">name</label><input class="form-control"
                                    required="" name="name" id="name_update">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>

                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <div class="col-md-6"><label class="form-label">externalId</label><input
                                    class="form-control" required="" name="externalId" id="externalId_update">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                            <div class="col-md-6"><label class="form-label">isActive</label><select name="isActive"
                                    id="isActive_update" class="form-select" required="">
                                    <option value="">...</option>
                                    <option value="true">Ativo</option>
                                    <option value="false">Desativado</option>
                                </select>
                                <div class="invalid-feedback">Choose a plan.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <div class="col-md-6"><label class="form-label">externalTeachingModalityId</label><input
                                    name="externalTeachingModalityId" id="externalTeachingModalityId_update"
                                    class="form-control" required="">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                            <div class="col-md-6"><label class="form-label">externalEducationLevelId</label><input
                                    class="form-control" required="" name="externalEducationLevelId"
                                    id="externalEducationLevelId_update">
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                        </div>
                        <div class="row justify-content-md-center align-items-center mb-3">
                            <div class="col-md-6"><label class="form-label">courseTypeId</label><select
                                    class="form-select" required="" name="courseTypeId" id="courseTypeId_update">
                                    <option value="">...</option>
                                    <option>bachelor</option>
                                    <option>licentiate</option>
                                    <option>technologist</option>
                                </select>
                                <div class="invalid-feedback">Choose a plan.</div>
                            </div>
                        </div>
                    </div>
                    <!-- // BODY -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Editar</button>
                </div>
            </form>
        </div>
    </div>
</div>


<script>

    const MODAL_UPDATE = document.getElementById('ModalUpdate');

    MODAL_UPDATE.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let id = button.getAttribute('data-id');
        let name = button.getAttribute('data-name');
        let externalId = button.getAttribute('data-externalId');
        let isActive = button.getAttribute('data-isActive');
        let externalTeachingModalityId = button.getAttribute('data-externalTeachingModalityId');
        let externalEducationLevelId = button.getAttribute('data-externalEducationLevelId');
        let courseTypeId = button.getAttribute('data-courseTypeId');

        let status = isActive == "True" ? "true" : "false"

        document.getElementById("id_update").value = id
        document.getElementById("name_update").value = name
        document.getElementById("externalId_update").value = externalId
        document.getElementById("isActive_update").value = status
        document.getElementById("externalTeachingModalityId_update").value = externalTeachingModalityId
        document.getElementById("externalEducationLevelId_update").value = externalEducationLevelId
        document.getElementById("courseTypeId_update").value = courseTypeId

    });
</script>
