<div class="modal fade" id="ModalUpdate" tabindex="-1" aria-labelledby="formModalLabel" style="display: none;"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <!-- FORM -->
            <form action="{{url_for('nivelEns_update')}}" method="post" class="needs-validation" novalidate="">
                <input type="hidden" id="update_id" name="id">
                <div class="modal-header">
                    <h2 class="modal-title h5">Atualizar Nivel de Ensino</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- BODY -->
                    <div class="panel">
                        <!-- Status || NAME -->
                        <div class="row g-2 mb-2 justify-content-md-center text-center">
                            <div class="col-md-4"><label class="form-label">Status</label><select name="status"
                                    id="status_id" class="form-select" required="">
                                    <option value="">...</option>
                                    <option value="True">True</option>
                                    <option value="False">False</option>
                                </select>
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                            <div class="col-md-8"><label class="form-label">Name</label><input name="name" id="name_id"
                                    class="form-control" required="">
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                        </div>
                        <!-- Status || NAME -->
                        <!-- externalId || educationLevelTypeId -->
                        <div class="row g-2 mb-2 justify-content-md-center text-center">
                            <div class="col-md-6"><label class="form-label">ExternalId</label><input name="externalId"
                                    id="exId_id" class="form-control" required="">
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                            <div class="col-md-6"><label class="form-label">EducationLevelTypeId</label><select
                                    name="educationLevelTypeId" id="eltId_id" class="form-select" required="">
                                    <option value="">...</option>
                                    <option value="graduate">Pós-graduação</option>
                                    <option value="undergraduate">Graduação</option>
                                    <option value="high_school">Ensino médio</option>
                                    <option value="extension_course">Curso de extensão</option>
                                </select>
                                <div class="invalid-feedback">Faz favor.</div>
                            </div>
                        </div>
                        <!-- Status || NAME -->
                    </div>
                    <!-- // BODY -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Voltar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
            <!-- // FORM -->
        </div>
    </div>
</div>

<script>

    const MODAL_UPDATE = document.getElementById('ModalUpdate');

    MODAL_UPDATE.addEventListener('show.bs.modal', function (event) {

        // Botão que abriu o modal
        const button = event.relatedTarget;

        // Recupera os atributos
        let id = button.getAttribute('data-id');
        let status = button.getAttribute('data-status');
        let name = button.getAttribute('data-name');
        let externalId = button.getAttribute('data-exId');
        let educationLevelTypeId = button.getAttribute('data-eltId');

        document.getElementById("update_id").value = id
        document.getElementById("status_id").value = status
        document.getElementById("name_id").value = name
        document.getElementById("exId_id").value = externalId
        document.getElementById("eltId_id").value = educationLevelTypeId
    });
</script>
